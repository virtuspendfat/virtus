<style>
:root{
  --bg:#F2F4F7;--sf:#FFFFFF;--sf2:#F4F6F9;--bd:#DDE2EA;--bd2:#B8C0CC;
  --tx:#1A2332;--tx2:#4A5568;--tx3:#8A95A3;
  --ac:#00796B;--ac2:#E0F5F3;--ac3:#004D40;
  --tl:#009688;--tld:#00695C;
  --bl:#1565C0;--bl2:#E3F2FD;
  --gn:#2E7D32;--gn2:#E8F5E9;
  --am:#E65100;--am2:#FFF3E0;
  --rd:#C62828;--rd2:#FFEBEE;
  --pu:#4527A0;--pu2:#EDE7F6;
  --r:6px;--r2:10px;--r3:14px;
  --sh:0 1px 4px rgba(0,0,0,.08);--sh2:0 4px 20px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:13px;line-height:1.5;}
button{font-family:'Poppins',sans-serif;cursor:pointer;border:none;background:none;}
input,select,textarea{font-family:'Poppins',sans-serif;font-size:13px;}

/* SIDEBAR */
.app{display:flex;min-height:100vh;}
.sidebar{width:228px;min-width:228px;background:var(--tld);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:0;}
.sb-mark{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;font-weight:800;color:#fff;letter-spacing:-1px;border:1px solid rgba(255,255,255,.25);}
.sb-brand h1{color:#fff;font-size:15px;font-weight:700;letter-spacing:.3px;}
.sb-brand p{color:rgba(255,255,255,.45);font-size:10px;}
.sb-nav{flex:1;padding:8px 0;}
.sb-grp{padding:10px 14px 3px;color:rgba(255,255,255,.38);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 14px;color:rgba(255,255,255,.68);font-size:12px;font-weight:500;cursor:pointer;border-left:3px solid transparent;transition:all .15s;margin:1px 6px;border-radius:0 var(--r) var(--r) 0;}
.sb-item:hover{background:rgba(255,255,255,.1);color:#fff;}
.sb-item.active{background:rgba(255,255,255,.18);color:#fff;border-left-color:#A7FFEB;font-weight:600;}
.sb-ico{font-size:11px;font-weight:700;width:20px;height:20px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.15);border-radius:50%;flex-shrink:0;}
.sb-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);}
.sb-foot p{color:rgba(255,255,255,.3);font-size:10px;line-height:1.6;}

/* TOPBAR */
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.tb-title{font-size:14px;font-weight:700;}
.tb-sub{font-size:10px;color:var(--tx3);margin-top:1px;}
.tb-right{display:flex;align-items:center;gap:8px;}
.content{padding:20px 24px;flex:1;}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199;}
.menu-toggle{display:none;}

/* PAGE */
.pg-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.pg-title{font-size:17px;font-weight:700;}
.pg-sub{font-size:11px;color:var(--tx3);margin-top:2px;}

/* CARDS */
.card{background:var(--sf);border:none;border-radius:var(--r2);padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.04);}
.c-hd{font-size:11px;font-weight:700;color:var(--tld);margin-bottom:14px;display:flex;align-items:center;gap:6px;border-bottom:2px solid var(--tl);padding-bottom:8px;text-transform:uppercase;letter-spacing:.6px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(136px,1fr));gap:12px;margin-bottom:18px;}
.stat{background:var(--sf);border:none;border-radius:var(--r2);padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.04);border-top:3px solid var(--tl);}
.stat.am{border-top-color:var(--am);}
.stat.rd{border-top-color:var(--rd);}
.stat.gn{border-top-color:var(--gn);}
.stat.pu{border-top-color:var(--pu);}
.stat.bl{border-top-color:var(--bl);}
.stat-lbl{font-size:10px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
.stat-val{font-size:26px;font-weight:800;line-height:1;color:var(--tx);}
.stat-val.am{color:var(--am);}
.stat-val.rd{color:var(--rd);}
.stat-val.gn{color:var(--gn);}
.stat-val.tl{color:var(--tl);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid transparent;letter-spacing:.2px;white-space:nowrap;}
.btn-p{background:var(--tl);color:#fff;border-color:var(--tl);}.btn-p:hover{background:var(--tld);border-color:var(--tld);}
.btn-s{background:var(--sf);color:var(--tx2);border-color:var(--bd);}.btn-s:hover{background:var(--sf2);}
.btn-d{background:var(--rd2);color:var(--rd);border-color:#f0b0b0;}.btn-d:hover{background:#fcc;}
.btn-sm{padding:5px 11px;font-size:11px;}
.btn-xs{padding:3px 8px;font-size:11px;}
.btn-ghost{color:var(--tx2);padding:6px 10px;border-radius:var(--r);border:1px solid transparent;}.btn-ghost:hover{background:var(--sf2);border-color:var(--bd);}

/* FORMS */
.form-row{display:grid;gap:12px;margin-bottom:12px;}
.fr2{grid-template-columns:1fr 1fr;}
.fr3{grid-template-columns:1fr 1fr 1fr;}
.fr4{grid-template-columns:1fr 1fr 1fr 1fr;}
label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:4px;letter-spacing:.2px;}
input[type=text],input[type=email],input[type=tel],input[type=date],input[type=time],input[type=number],select,textarea{
  width:100%;padding:8px 11px;border:1.5px solid var(--bd2);border-radius:var(--r);
  background:var(--sf);color:var(--tx);outline:none;transition:all .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--tl);box-shadow:0 0 0 2px rgba(0,150,136,.15);outline:none;}
textarea{resize:vertical;min-height:80px;}

/* TABLES */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead{background:linear-gradient(180deg,#f8fffe 0%,var(--sf2) 100%);}
th{text-align:left;padding:10px 14px;border-bottom:2px solid var(--tl);color:var(--tld);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.7px;white-space:nowrap;}
td{padding:10px 14px;border-bottom:1px solid var(--bd);vertical-align:middle;transition:background .1s;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:#F0FFFE;}
.td-act{display:flex;gap:4px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;}
.bag{background:var(--am2);color:var(--am);}
.bau{background:var(--ac2);color:var(--ac3);}
.bfa{background:var(--pu2);color:var(--pu);}
.bpp{background:var(--rd2);color:var(--rd);}
.bpr{background:var(--gn2);color:var(--gn);}
.bh{background:var(--bl2);color:var(--bl);}
.bo{background:var(--pu2);color:var(--pu);}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(10,20,40,.55);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:18px 12px;overflow-y:auto;}
.modal{background:var(--sf);border-radius:var(--r3);width:100%;max-width:1100px;box-shadow:0 8px 40px rgba(0,0,0,.18);border:1px solid var(--bd);}
.modal-hd{padding:16px 22px;border-bottom:2px solid var(--tl);display:flex;align-items:center;justify-content:space-between;background:var(--sf);border-radius:var(--r3) var(--r3) 0 0;}
.modal-title{font-size:14px;font-weight:700;}
.modal-body{padding:20px 22px;max-height:76vh;overflow-y:auto;}
.modal-ft{padding:12px 22px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px;background:var(--sf);border-radius:0 0 var(--r3) var(--r3);}
.modal-x{font-size:18px;color:var(--tx3);cursor:pointer;padding:3px 7px;border-radius:var(--r);line-height:1;}.modal-x:hover{background:var(--bd);color:var(--tx);}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--bd);margin-bottom:16px;overflow-x:auto;gap:0;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:thin;}
.tab{padding:6px 10px;font-size:11px;font-weight:500;color:var(--tx3);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s;}
.tab:hover{color:var(--tx2);}
.tab.active{color:var(--tl);border-bottom-color:var(--tl);font-weight:700;}

/* MISC */
.sep{border:none;border-top:1px solid var(--bd);margin:14px 0;}
.alert{padding:10px 13px;border-radius:var(--r);font-size:12px;margin-bottom:10px;font-weight:500;border-left:3px solid;}
.al-d{background:var(--rd2);color:var(--rd);border-color:var(--rd);}
.al-s{background:var(--gn2);color:var(--gn);border-color:var(--gn);}
.al-i{background:var(--ac2);color:var(--ac3);border-color:var(--tl);}
.al-w{background:var(--am2);color:var(--am);border-color:var(--am);}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;background:var(--sf2);color:var(--tx2);border:1px solid var(--bd);}
.empty{text-align:center;padding:44px 20px;color:var(--tx3);}
.empty h3{font-size:13px;color:var(--tx2);margin-bottom:5px;font-weight:600;}
.spin{width:15px;height:15px;border:2px solid var(--bd2);border-top-color:var(--tl);border-radius:50%;animation:sp .7s linear infinite;display:inline-block;}
@keyframes sp{to{transform:rotate(360deg);}}
.sw{position:relative;}.sw input{padding-left:32px;}.sw-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none;}

/* MATERIAIS */
.mat-row{display:grid;grid-template-columns:1.2fr 2.5fr 68px 108px 108px 26px;gap:7px;align-items:end;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--bd);}
.mat-sub{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px;margin-top:7px;}
.mat-add{display:inline-flex;align-items:center;gap:5px;color:var(--tl);font-size:12px;font-weight:600;cursor:pointer;padding:5px 0;}.mat-add:hover{opacity:.7;}
.mat-rm{color:var(--rd);cursor:pointer;font-size:18px;padding:2px;border-radius:4px;line-height:1;}.mat-rm:hover{background:var(--rd2);}

/* EVIDENCIAS */
.ev-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;}
.ev-item{display:flex;align-items:center;gap:5px;padding:3px 9px;background:var(--sf2);border:1px solid var(--bd);border-radius:20px;font-size:11px;}
.ev-rm{color:var(--tx3);font-size:13px;cursor:pointer;}.ev-rm:hover{color:var(--rd);}

/* ATIVIDADES */
.atv-card{border:1px solid var(--bd);border-radius:var(--r2);padding:13px 15px;margin-bottom:9px;background:var(--sf);transition:box-shadow .15s;}
.atv-card:hover{box-shadow:var(--sh2);}
.atv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.atv-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;}
.at-email{background:#E3F2FD;color:#1565C0;}
.at-tel{background:#E8F5E9;color:#2E7D32;}
.at-pres{background:#F3E5F5;color:#6A1B9A;}
.at-rem{background:#FFF3E0;color:#E65100;}
.at-wpp{background:#E8F5E9;color:#1B5E20;}
.at-sms{background:#E0F2F1;color:#004D40;}
.atv-meta{font-size:11px;color:var(--tx3);display:flex;gap:12px;flex-wrap:wrap;margin:6px 0;}
.atv-body{font-size:12px;color:var(--tx2);line-height:1.6;white-space:pre-wrap;margin-top:4px;}
.atv-prox{margin-top:8px;padding:7px 10px;background:var(--ac2);border-radius:var(--r);border-left:3px solid var(--tl);font-size:11px;color:var(--ac3);}
.atv-form{background:var(--sf2);border:2px solid var(--tl);border-radius:var(--r2);padding:14px;margin-bottom:12px;}

/* AGENDA */
.ag-item{display:flex;gap:12px;padding:10px 13px;border-radius:var(--r);border:1px solid var(--bd);margin-bottom:7px;background:var(--sf);align-items:flex-start;}
.ag-date{text-align:center;min-width:42px;background:var(--tl);color:#fff;border-radius:var(--r);padding:5px 3px;flex-shrink:0;}
.ag-d{font-size:20px;font-weight:800;line-height:1;}
.ag-m{font-size:9px;text-transform:uppercase;opacity:.85;}
.ag-content{flex:1;}
.ag-title{font-size:12px;font-weight:600;}
.ag-sub{font-size:11px;color:var(--tx3);margin-top:1px;}

/* CONTATOS */
.cnt-box{background:var(--sf2);border-radius:var(--r);padding:11px 13px;margin-bottom:9px;border:1px solid var(--bd);}

/* SETUP */
.setup{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(140deg,var(--tld) 0%,#002F2B 100%);padding:20px;}
.setup-card{background:#fff;border-radius:16px;padding:36px;max-width:480px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.25);}
.setup-logo{font-size:28px;font-weight:800;color:var(--tld);letter-spacing:-1px;margin-bottom:4px;}
.setup-sub{color:var(--tx2);font-size:13px;margin-bottom:22px;}
.setup-note{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:11px 14px;font-size:11px;color:var(--tx2);margin-top:14px;line-height:1.7;}
.setup-note a{color:var(--tl);}

/* DOSSIÊ */
.dos-page{position:fixed;inset:0;background:var(--bg);z-index:300;overflow-y:auto;}
.dos-inner{max-width:900px;margin:0 auto;padding:22px 22px 80px;}
.dos-sec h3{font-size:10px;font-weight:700;color:var(--tld);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;border-bottom:2px solid var(--tl);padding-bottom:5px;}
.dos-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px 20px;font-size:12px;}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:2fr 1fr;gap:18px;}
.prog-bar{height:5px;background:var(--sf2);border-radius:3px;overflow:hidden;margin-top:3px;}
.prog-fill{height:100%;background:var(--tl);border-radius:3px;}

/* IMPORTAR */
.up-zone{border:2px dashed var(--bd2);border-radius:var(--r2);padding:22px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:12px;}
.up-zone:hover{border-color:var(--tl);background:var(--ac2);}
.up-zone h4{font-size:13px;font-weight:600;color:var(--tx2);margin-top:8px;}
.up-zone p{font-size:11px;color:var(--tx3);margin-top:3px;}

/* MOBILE */
@media(max-width:800px){
  .sidebar{position:fixed;left:-228px;z-index:200;transition:left .25s;top:0;}
  .sidebar.open{left:0;}.sb-ov.show{display:block;}
  .menu-toggle{display:flex;}.content{padding:14px 16px;}
  .fr2,.fr3,.fr4{grid-template-columns:1fr;}
  .mat-row{grid-template-columns:1fr 1fr;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .dash-grid{grid-template-columns:1fr;}
  .dos-grid{grid-template-columns:1fr 1fr;}
}
@media print{.no-print{display:none!important;}.dos-page{position:static;}}
</style>

<script>
"use strict";
const SBU='vt_url',SBK='vt_key';

    localStorage.setItem(SBU,'https://etjkyqfruakhuhmrfbah.supabase.co');

  }

/* ── DB REST ─────────────────────────────────────────────── */
const DB={
  url:'',key:'',
  init(u,k){this.url=u.replace(/\/$/,'');this.key=k;},
  hd(){return{'Content-Type':'application/json','apikey':this.key,'Authorization':'Bearer '+this.key,'Prefer':'return=representation'};},
  async req(method,table,opts={}){
    let path='/rest/v1/'+table;
    const p=[];
    if(opts.select)p.push('select='+opts.select);
    if(opts.order)p.push('order='+opts.order);
    if(opts.limit)p.push('limit='+opts.limit);
    if(opts.eq)Object.entries(opts.eq).forEach(([k,v])=>p.push(k+'=eq.'+encodeURIComponent(v)));
    if(p.length)path+='?'+p.join('&');
    const fo={method,headers:this.hd()};
    if(opts.body)fo.body=JSON.stringify(opts.body);
    const res=await fetch(this.url+path,fo);
    const txt=await res.text();
    let data=null;try{data=txt?JSON.parse(txt):null;}catch(e){}
    if(!res.ok)return{data:null,error:data||{message:'HTTP '+res.status+': '+txt.substring(0,200)}};
    return{data,error:null};
  },
  sel(t,o){return this.req('GET',t,o);},
  ins(t,b){return this.req('POST',t,{body:b});},
  upd(t,b,eq){const{id,created_at,...rest}=b;return this.req('PATCH',t,{body:rest,eq});},
  del(t,eq){return this.req('DELETE',t,{eq});},
  async test(){
    try{
      const r=await fetch(this.url+'/rest/v1/devedores?limit=1',{headers:this.hd()});
      const txt=await r.text();
      if(r.status===200||r.status===206)return{ok:true};
      if(r.status===401)return{ok:false,msg:'HTTP 401 - Chave invalida.'};
      if(r.status===403)return{ok:false,msg:'HTTP 403: '+txt.substring(0,150)};
      if(r.status===404)return{ok:false,msg:'HTTP 404 - URL nao encontrada.'};
      if(txt.includes('relation')||txt.includes('does not exist'))return{ok:false,msg:'TABELAS'};
      return{ok:false,msg:'HTTP '+r.status+': '+txt.substring(0,200)};
    }catch(e){return{ok:false,msg:'Falha: '+e.message+' | URL: '+this.url};}
  }
};

/* ── STATE ───────────────────────────────────────────────── */
const S={page:'dashboard',devs:[],cirs:[],prods:[],protos:[],loading:false,sbOpen:false,
  alert:null,atimer:null,searchDev:'',tipoDev:'Todos',searchCir:'',stCir:'todos',searchProd:''};

const STATUS={aguardando:'Aguardando Autorizacao de Faturamento',autorizado:'Faturamento Autorizado',
  faturado:'Totalmente Faturado',pag_pendente:'Pendencia de Pagamento',pag_realizado:'Processo Concluido'};

const PORTAIS=['Opmenexo','Inpart','EMS Ventura','GT Plan','Apoio','E-mail','Outros'];
const ESPEC=['Ortopedia','Cardiologia','Neurologia','Cirurgia Geral','Oncologia','Urologia','Ginecologia','Outros'];
const DEPTOS=['Compras','Autorizacao','Auditoria','Faturamento','Diretoria','Outros'];
const NIVEIS=['Analista','Coordenador','Supervisor','Gerente','Diretor','Presidente','Outros'];
const EV_PRE=['Pedido Medico','Cotacao Respondida','Cotacao Aprovada','Identificacao Fonte Pagadora','NF de Remessa','Comprovante Recebimento Hospital'];

const fmt$=v=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
function fmtAbbr(v){
  // Exibe valor abreviado: >=1000 → "R$ 42,3K", >=1000000 → "R$ 1,2M"
  if(typeof v==='number'){
    if(v>=1000000)return 'R$ '+(v/1000000).toFixed(1).replace('.',',')+'M';
    if(v>=1000)return 'R$ '+(v/1000).toFixed(1).replace('.',',')+'K';
    return fmt$(v);
  }
  // Para qtd (número inteiro)
  return String(v);
}
const fmtD=function(d){
  if(!d)return '--';
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(d))return d;
  if(/^\d{4}-\d{2}-\d{2}$/.test(d)){var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
  try{return new Date(d+'T00:00:00').toLocaleDateString('pt-BR');}catch(e){return d;}
};
const toISO=function(d){
  if(!d)return '';
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(d)){var p=d.split('/');return p[2]+'-'+p[1]+'-'+p[0];}
  return d;
};
function applyDateMasks(){
  document.querySelectorAll('input.dt-mask').forEach(function(el){
    if(el._maskApplied)return;
    el._maskApplied=true;
    el.addEventListener('input',function(){
      var v=this.value.replace(/\D/g,'');
      if(v.length>4)v=v.slice(0,2)+'/'+v.slice(2,4)+'/'+v.slice(4,8);
      else if(v.length>2)v=v.slice(0,2)+'/'+v.slice(2);
      this.value=v;
    });
  });
}

async function doConnect(){
  let url=(document.getElementById('sb-url').value||localStorage.getItem(SBU)||'').trim();
  let key=(document.getElementById('sb-key').value||localStorage.getItem(SBK)||'').trim();
  if(!url||!key){renderSetup('Preencha URL e chave.');return;}
  if(!url.startsWith('http'))url='https://'+url;
  const btn=document.getElementById('btn-conn');
  btn.innerHTML='<span class="spin"></span> Conectando...';btn.disabled=true;
  DB.init(url,key);
  const res=await DB.test();
  if(!res.ok){
    renderSetup(res.msg==='TABELAS'?'Conexao OK! Execute o SQL Schema abaixo para criar as tabelas.':res.msg);
    return;
  }
  localStorage.setItem(SBU,url);localStorage.setItem(SBK,key);
  await loadData();renderApp();
}

async function loadData(){
  S.loading=true;
  const[rd,rc,rp,rpt]=await Promise.all([
    DB.sel('devedores',{select:'*',order:'razao_social'}),
    DB.sel('cirurgias',{select:'*',order:'created_at.desc'}),
    DB.sel('produtos',{select:'*',order:'referencia'}),
    DB.sel('protocolos',{select:'*',order:'nome'})
  ]);
  S.prods=(rp.data||[]);
  S.protos=(rpt.data||[]).map(function(p){return Object.assign({},p,{itens:pJ(p.itens)});});
  S.devs=(rd.data||[]).map(d=>({...d,contatos:pJ(d.contatos)}));
  S.cirs=(rc.data||[]).map(function(c){
    // Extrair campo _meta embutido em mat_orcado (fallback de persistência)
    var matOrc=pJ(c.mat_orcado);
    var metaEl=matOrc.find(function(m){return m._meta;});
    var metaResp=metaEl&&metaEl._responsaveis?metaEl._responsaveis:{};
    // Campo responsaveis dedicado no banco (se existir)
    var resp=pJ(c.responsaveis)||{};
    // Resolver array de solicitantes para cada fase
    function getResp(key){
      var fc=Array.isArray(resp[key])?resp[key]:(resp[key]&&resp[key].sol?[resp[key]]:[]);
      var fm=Array.isArray(metaResp[key])?metaResp[key]:(metaResp[key]&&metaResp[key].sol?[metaResp[key]]:[]);
      return fc.length>0?fc:(fm.length>0?fm:[]);
    }
    return Object.assign({},c,{
      mat_orcado:matOrc.filter(function(m){return !m._meta;}),
      mat_autorizado:pJ(c.mat_autorizado),
      mat_utilizado:pJ(c.mat_utilizado),
      mat_fat_autorizado:pJ(c.mat_fat_autorizado),
      mat_faturado:pJ(c.mat_faturado),
      evidencias_pre:pJ(c.evidencias_pre),
      evidencias_pos:pJ(c.evidencias_pos),
      atividades:pJ(c.atividades),
      responsaveis:resp,
      resp_orcado:getResp('orcado'),
      resp_autorizado:getResp('autorizado'),
      resp_utilizado:getResp('utilizado'),
      resp_fat_autorizado:getResp('fat_autorizado'),
      resp_faturado:getResp('faturado')
    });
  });
  S.loading=false;
}

// buildDonut — global para uso em dashboard e agenda
function buildDonut(data,label,fmt_fn,centerFmt){
    const total=data.reduce((s,d)=>s+d.v,0);
    if(total===0)return '<div style="text-align:center;padding:20px;color:var(--tx3);font-size:12px">Sem dados</div>';
    const cores=['#009688','#1565C0','#E65100','#4527A0','#C62828','#2E7D32','#F57F17'];
    let ang=0;
    const R=44, r=24; // raio externo e interno (rosca)
    const slices=data.map((d,i)=>{
      const pct=d.v/total;
      const startAng=ang; ang+=pct*2*Math.PI;
      // Arcos externos e internos para rosca
      const ox1=50+R*Math.cos(startAng-Math.PI/2);
      const oy1=50+R*Math.sin(startAng-Math.PI/2);
      const ox2=50+R*Math.cos(ang-Math.PI/2);
      const oy2=50+R*Math.sin(ang-Math.PI/2);
      const ix1=50+r*Math.cos(ang-Math.PI/2);
      const iy1=50+r*Math.sin(ang-Math.PI/2);
      const ix2=50+r*Math.cos(startAng-Math.PI/2);
      const iy2=50+r*Math.sin(startAng-Math.PI/2);
      const large=pct>0.5?1:0;
      const cor=cores[i%cores.length];
      const path='M'+ox1+','+oy1+' A'+R+','+R+',0,'+large+',1,'+ox2+','+oy2
        +' L'+ix1+','+iy1+' A'+r+','+r+',0,'+large+',0,'+ix2+','+iy2+' Z';
      return {path,cor,label:d.lbl,v:d.v,pct:Math.round(pct*100)};
    });
    const svgSlices=slices.map(s=>'<path d="'+s.path+'" fill="'+s.cor+'" stroke="#fff" stroke-width="1.5"><title>'+esc(s.label)+': '+fmt_fn(s.v)+' ('+s.pct+'%)</title></path>').join('');
    // Texto central com total
    const cfmt=centerFmt||fmt_fn;
    const totalStr=cfmt(total);
    const totalFull=fmt_fn(total); // valor completo para tooltip
    // Texto central em 2 linhas: valor abreviado + tooltip com valor completo
    const line1FontSize=totalStr.length>10?'6.5':totalStr.length>7?'7':'8';
    const totalTxt=data.length>0
      ?'<title>'+totalFull+'</title>'
       +'<text x="50" y="46" text-anchor="middle" font-size="'+line1FontSize+'" font-weight="800" fill="var(--tld)">'+totalStr+'</text>'
       +'<text x="50" y="56" text-anchor="middle" font-size="6.5" fill="var(--tx3)">total</text>'
      :''
    const legend=slices.slice(0,7).map(s=>'<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;font-size:11px"><span style="width:11px;height:11px;border-radius:3px;background:'+s.cor+';flex-shrink:0"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--tx2)">'+esc(s.label)+'</span><strong style="color:var(--tx)">'+s.pct+'%</strong></div>').join('');
    return '<div style="display:flex;align-items:center;gap:14px">'
      +'<svg width="140" height="140" viewBox="0 0 100 100">'+svgSlices+totalTxt+'</svg>'
      +'<div style="flex:1">'+legend+'</div>'
      +'</div>';
  }

var CF=null,CT='geral';
function openMCir(c){
  CF=c?JSON.parse(JSON.stringify(c)):emptyCir();
  // mat_orcado sempre garante ao menos 1 linha vazia
  CF.mat_orcado=(CF.mat_orcado||[emptyMat()]).map(function(m){return Object.assign({_id:uid()},m);});
  // Demais abas: preservar se já têm dados, senão deixar VAZIO (sem copiar do orçado)
  ['mat_autorizado','mat_utilizado','mat_faturado'].forEach(function(k){
    var existing=CF[k]||[];
    var temDados=existing.length>0&&existing.some(function(m){return m.ref||m.desc;});
    CF[k]=temDados
      ? existing.map(function(m){return Object.assign({_id:uid()},m);})
      : []; // vazio por padrão
  });
  CF.atividades=pJ(CF.atividades).map(function(a){return Object.assign({_id:uid(),anexos:[]},a,{anexos:pJ(a.anexos)});});
  // Normalizar resp_* para array de histórico
  ['orcado','autorizado','utilizado','faturado'].forEach(function(k){
    var rk='resp_'+k;
    var v=CF[rk];
    if(!v) CF[rk]=[];
    else if(typeof v==='string'){try{v=JSON.parse(v);}catch(e){v=[];} CF[rk]=Array.isArray(v)?v:(v.sol?[v]:[]);}
    else if(!Array.isArray(v)) CF[rk]=v.sol?[v]:[];
    // garantir que cada item tem ts
    CF[rk]=CF[rk].map(function(r){return Object.assign({ts:r.ts||new Date().toISOString()},r);});
  });
  CT='geral';renderMCir();
}

// Mapa: destino → fonte da etapa anterior
var _FASE_ANTERIOR={
  mat_autorizado:'mat_orcado',
  mat_utilizado:'mat_autorizado',
  mat_fat_autorizado:'mat_utilizado',
  mat_faturado:'mat_fat_autorizado'
};
var _FASE_LABEL={
  mat_orcado:'F1 Orcado',
  mat_autorizado:'F2 Autorizado',
  mat_utilizado:'F3 Utilizado',
  mat_fat_autorizado:'F4 Fat.Autorizado'
};

function importarEtapaAnterior(destKey){
  var srcKey=_FASE_ANTERIOR[destKey];
  if(!srcKey)return;
  var src=CF[srcKey]||[];
  var srcLabel=_FASE_LABEL[srcKey]||srcKey;
  if(!src.length||(src.length===1&&!src[0].ref&&!src[0].desc)){
    showAlert('Etapa anterior ('+srcLabel+') não tem itens para importar.','warn');
    return;
  }
  var dest=CF[destKey]||[];
  var vazio=!dest.length||(dest.length===1&&!dest[0].ref&&!dest[0].desc);
  if(!vazio&&!confirm('Esta etapa já tem itens. Substituir pelos itens da etapa anterior ('+srcLabel+')?'))return;
  CF[destKey]=src.map(function(m){return Object.assign({},m,{_id:uid()});});
  renderMCir();
  showAlert('Itens importados de '+srcLabel+'!','success');
}

function addSolicitante(rk){
  var solEl=document.getElementById('rsp-sol-'+rk);
  if(!solEl||!solEl.value.trim()){
    showAlert('Informe ao menos o Nome do solicitante.','danger');return;
  }
  var entry={
    sol:document.getElementById('rsp-sol-'+rk).value.trim(),
    tel:(document.getElementById('rsp-tel-'+rk)||{}).value||'',
    email:(document.getElementById('rsp-email-'+rk)||{}).value||'',
    data:(document.getElementById('rsp-data-'+rk)||{}).value||'',
    ts:new Date().toISOString()
  };
  if(!Array.isArray(CF[rk]))CF[rk]=[];
  CF[rk].push(entry);
  renderMCir(); // rerender para mostrar no histórico
  showAlert('Solicitante registrado!','success');
}

function autoFillProd(k,i){
  var refEl=document.getElementById('m-ref-'+k+'-'+i);
  if(!refEl)return;
  var ref=refEl.value.trim().toUpperCase();
  var prod=S.prods.find(function(p){return (p.referencia||'').toUpperCase()===ref;});
  if(prod){
    CF[k][i].ref=prod.referencia;
    CF[k][i].desc=prod.descricao;
    if(prod.preco_lista&&!CF[k][i].vUnit){
      CF[k][i].vUnit=prod.preco_lista;
      CF[k][i].vTotal=(parseFloat(CF[k][i].qty||1)*parseFloat(prod.preco_lista||0)).toFixed(2);
    }
    renderMCir();
  }
}


function updM(k,i,f,v){
  CF[k][i][f]=v;
  if(f==='qty'||f==='vUnit'){
    CF[k][i].vTotal=(parseFloat(CF[k][i].qty||0)*parseFloat(CF[k][i].vUnit||0)).toFixed(2);
    // Atualiza só o campo total sem re-render
    var totalEl=document.getElementById('mat-tot-'+k+'-'+i);
    if(totalEl)totalEl.value=fmt$(CF[k][i].vTotal||0);
    // Atualiza o total geral
    var sumEl=document.getElementById('mat-sum-'+k);
    if(sumEl)sumEl.textContent='Total: '+fmt$(matTot(CF[k]));
  }
}

function rmM(k,i){CF[k].splice(i,1);if(!CF[k].length)CF[k].push(emptyMat());renderMCir();}

function buildSaldo(){
  var util=CF.mat_utilizado||[];
  var fat=CF.mat_faturado||[];
  var fatAut=CF.mat_fat_autorizado||[];

  // Calcular saldo por item: quantidade E valor
  var saldoItens=util.filter(function(m){return m.ref||m.desc;}).map(function(m){
    var fatItems=fat.filter(function(f){return f.ref===m.ref;});
    var qtdFat=fatItems.reduce(function(s,f){return s+parseFloat(f.qty||0);},0);
    var vlFat=fatItems.reduce(function(s,f){return s+parseFloat(f.vTotal||0);},0);
    var qtdUtil=parseFloat(m.qty||0);
    var vlUtil=parseFloat(m.vTotal||0);
    var saldoQtd=qtdUtil-qtdFat;
    var saldoVl=vlUtil-vlFat;
    var vlUnitario=parseFloat(m.vUnit||0);
    return Object.assign({},m,{
      qtdFat:qtdFat, vlFat:vlFat,
      saldoQtd:saldoQtd, saldoVl:saldoVl,
      vlUnitario:vlUnitario
    });
  }).filter(function(m){return m.saldoQtd>0.001||m.saldoVl>0.01;});

  // Itens F4 ainda não faturados
  var pendFat=fatAut.filter(function(m){return m.ref||m.desc;}).map(function(m){
    var fatItems=fat.filter(function(f){return f.ref===m.ref;});
    var qtdFat=fatItems.reduce(function(s,f){return s+parseFloat(f.qty||0);},0);
    var vlFat=fatItems.reduce(function(s,f){return s+parseFloat(f.vTotal||0);},0);
    var qtdPend=parseFloat(m.qty||0)-qtdFat;
    var vlPend=parseFloat(m.vTotal||0)-vlFat;
    return Object.assign({},m,{qtdPend:qtdPend,vlPend:vlPend});
  }).filter(function(m){return m.qtdPend>0.001||m.vlPend>0.01;});

  var totalSaldoVl=saldoItens.reduce(function(s,m){return s+m.saldoVl;},0);
  var totalSaldoQtd=saldoItens.reduce(function(s,m){return s+m.saldoQtd;},0);
  var totalPendVl=pendFat.reduce(function(s,m){return s+m.vlPend;},0);

  var rows=saldoItens.map(function(m){
    return '<tr>'
      +'<td style="font-family:monospace;font-size:11px">'+esc(m.ref||'--')+'</td>'
      +'<td>'+esc(m.desc||'--')+'</td>'
      +'<td style="text-align:center;color:var(--tx2)">'+parseFloat(m.qty||0)+'</td>'
      +'<td style="text-align:center;color:var(--gn)">'+m.qtdFat+'</td>'
      +'<td style="text-align:center;font-weight:700;color:var(--rd)">'+m.saldoQtd.toFixed(m.saldoQtd%1===0?0:2)+'</td>'
      +'<td style="text-align:right">'+fmt$(m.vUnit||0)+'</td>'
      +'<td style="text-align:right;color:var(--tx2)">'+fmt$(m.vTotal)+'</td>'
      +'<td style="text-align:right;color:var(--gn)">'+fmt$(m.vlFat)+'</td>'
      +'<td style="text-align:right;font-weight:700;color:var(--rd)">'+fmt$(m.saldoVl)+'</td>'
      +'</tr>';
  }).join('');

  var pendRows=pendFat.map(function(m){
    return '<tr style="background:var(--am2)">'
      +'<td style="font-family:monospace;font-size:11px">'+esc(m.ref||'--')+'</td>'
      +'<td>'+esc(m.desc||'--')+'</td>'
      +'<td style="text-align:center">'+parseFloat(m.qty||0)+'</td>'
      +'<td style="text-align:center;font-weight:700;color:var(--am)">'+m.qtdPend.toFixed(m.qtdPend%1===0?0:2)+'</td>'
      +'<td style="text-align:right">'+fmt$(m.vUnit||0)+'</td>'
      +'<td style="text-align:right;font-weight:700;color:var(--am)">'+fmt$(m.vlPend)+'</td>'
      +'</tr>';
  }).join('');

  var pendBlock=pendFat.length>0
    ?'<div style="background:var(--am2);border:2px solid var(--am);border-radius:var(--r2);padding:14px;margin-bottom:16px">'
      +'<div style="font-size:12px;font-weight:700;color:var(--am);margin-bottom:10px">&#9888; FASE 4 — ITENS LIBERADOS PARA FATURAR MAS AINDA NÃO FATURADOS</div>'
      +'<div class="tbl-wrap"><table><thead><tr><th>Ref.</th><th>Descricao</th><th style="text-align:center">Qtd.Aut.</th><th style="text-align:center">Saldo.Qtd</th><th style="text-align:right">Vl.Unit.</th><th style="text-align:right">Vl.Pendente</th></tr></thead>'
      +'<tbody>'+pendRows+'</tbody></table></div>'
      +'<div style="text-align:right;font-weight:700;color:var(--am);margin-top:8px;font-size:13px">Total Pendente: '+fmt$(totalPendVl)+'</div>'
      +'</div>'
    :'';

  if(saldoItens.length===0&&pendFat.length===0)
    return '<div class="empty"><h3>Sem saldo a faturar</h3><p>Todos os itens utilizados ja foram faturados.</p></div>';

  var resumo='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">'
    +'<div style="text-align:center;padding:12px;background:var(--rd2);border-radius:var(--r2);border-top:3px solid var(--rd)">'
    +'<div style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Saldo de Quantidade</div>'
    +'<div style="font-size:22px;font-weight:800;color:var(--rd)">'+totalSaldoQtd.toFixed(totalSaldoQtd%1===0?0:2)+' un.</div>'
    +'</div>'
    +'<div style="text-align:center;padding:12px;background:var(--rd2);border-radius:var(--r2);border-top:3px solid var(--rd)">'
    +'<div style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Saldo de Valor</div>'
    +'<div style="font-size:22px;font-weight:800;color:var(--rd)">'+fmt$(totalSaldoVl)+'</div>'
    +'</div>'
    +'</div>';

  return pendBlock+resumo
    +(saldoItens.length>0
      ?'<div style="font-size:11px;color:var(--tx3);margin-bottom:10px">&#128274; Calculado automaticamente — nao editavel | Saldo = Utilizado (-) Faturado</div>'
      +'<div class="tbl-wrap"><table><thead><tr>'
      +'<th>Ref.</th><th>Descricao</th>'
      +'<th style="text-align:center;background:var(--sf2)">Qtd.Util.</th>'
      +'<th style="text-align:center;background:var(--gn2);color:var(--gn)">Qtd.Fat.</th>'
      +'<th style="text-align:center;background:var(--rd2);color:var(--rd)">Saldo.Qtd</th>'
      +'<th style="text-align:right">Vl.Unit.</th>'
      +'<th style="text-align:right;background:var(--sf2)">Vl.Util.</th>'
      +'<th style="text-align:right;background:var(--gn2);color:var(--gn)">Vl.Fat.</th>'
      +'<th style="text-align:right;background:var(--rd2);color:var(--rd)">Saldo.Vl</th>'
      +'</tr></thead>'
      +'<tbody>'+rows
      +'<tr style="background:var(--sf2);font-weight:700">'
      +'<td colspan="2" style="text-align:right">TOTAL</td>'
      +'<td></td><td></td>'
      +'<td style="text-align:center;color:var(--rd)">'+totalSaldoQtd.toFixed(totalSaldoQtd%1===0?0:2)+'</td>'
      +'<td></td><td></td><td></td>'
      +'<td style="text-align:right;color:var(--rd)">'+fmt$(totalSaldoVl)+'</td>'
      +'</tr>'
      +'</tbody></table></div>'
    :'');
}

  try{
    // Não sobrescrever resp_* — é histórico, já foi gerenciado por addSolicitante()
    // Apenas garantir que existem como arrays
    ['orcado','autorizado','utilizado','faturado'].forEach(function(k){
      var rk='resp_'+k;
      if(!Array.isArray(CF[rk]))CF[rk]=CF[rk]&&CF[rk].sol?[CF[rk]]:[];
    });
    // Capturar campos de material ainda em foco
    ['mat_orcado','mat_autorizado','mat_utilizado','mat_faturado'].forEach(function(k){
      (CF[k]||[]).forEach(function(m,i){
        var ref=document.getElementById('m-ref-'+k+'-'+i);
        var desc=document.getElementById('m-desc-'+k+'-'+i);
        if(ref)m.ref=ref.value;
        if(desc)m.desc=desc.value;
      });
    });
    // Montar payload
    var payload=Object.assign({},CF);
    // Salvar responsaveis na coluna dedicada (se existir no banco)
    payload.responsaveis={
      orcado:CF.resp_orcado||[],
      autorizado:CF.resp_autorizado||[],
      utilizado:CF.resp_utilizado||[],
      fat_autorizado:CF.resp_fat_autorizado||[],
      faturado:CF.resp_faturado||[]
    };
    payload.mat_fat_autorizado=CF.mat_fat_autorizado||[];
    // TAMBÉM embutir responsaveis dentro de mat_orcado como elemento _meta
    // Isso garante persistência mesmo se a coluna responsaveis não existir
    var metaElem={_meta:true,_responsaveis:{
      orcado:CF.resp_orcado||[],
      autorizado:CF.resp_autorizado||[],
      utilizado:CF.resp_utilizado||[],
      fat_autorizado:CF.resp_fat_autorizado||[],
      faturado:CF.resp_faturado||[]
    }};
    var matOrc=payload.mat_orcado.filter(function(m){return !m._meta;});
    payload.mat_orcado=[metaElem].concat(matOrc);
    // Remover campos resp_* soltos
    delete payload.resp_orcado;
    delete payload.resp_autorizado;
    delete payload.resp_utilizado;
    delete payload.resp_fat_autorizado;
    delete payload.resp_faturado;
    var res;
    if(payload.id){res=await DB.upd('cirurgias',payload,{id:payload.id});}
    else{var{id,...ins}=payload;res=await DB.ins('cirurgias',ins);}
    if(res.error)throw new Error(res.error.message||JSON.stringify(res.error));
    // Recarregar dados em background sem fechar o modal
    await loadData();
    // Atualizar CF com o id gerado (para cirurgia nova)
    if(!CF.id&&res.data){
      var saved=Array.isArray(res.data)?res.data[0]:res.data;
      if(saved&&saved.id)CF.id=saved.id;
    }
    // Atualizar tabela em background se estiver na página de cirurgias
    if(S.page==='cirurgias'){
      renderCirs();
      // Reabrir o modal mantendo a aba atual
      var mcirWrap=document.getElementById('mcir-wrap');
      if(mcirWrap&&mcirWrap.innerHTML){
        // Modal ainda aberto — apenas atualizar o título
        var titleEl=document.querySelector('#mcir-wrap .modal-title');
        if(titleEl)titleEl.textContent='Editar Cirurgia -- '+(CF.paciente||'');
      }
    }
    btn.innerHTML='Gravar Cirurgia';btn.disabled=false;
    showAlert('Cirurgia gravada com sucesso! ✓','success');
  }catch(e){
    var el=document.getElementById('cerr');
    if(el)el.innerHTML='<div class="alert al-d">Erro: '+esc(e.message)+'</div>';
    btn.innerHTML='Gravar Cirurgia';btn.disabled=false;
  }
}
async function delCir(id){
  if(!confirm('Excluir esta cirurgia?'))return;
  await DB.del('cirurgias',{id});
  S.cirs=S.cirs.filter(c=>c.id!==id);renderCirs();showAlert('Cirurgia removida.');
}

/* ── AGENDA ──────────────────────────────────────────────── */
function renderAgenda(){
  var hoje=new Date().toISOString().split('T')[0];
  var acoes=[];
  var concluidas=[];
  S.cirs.forEach(function(cc){
    (cc.atividades||[]).forEach(function(a){
      var h=S.devs.find(d=>d.id===cc.hospital_id);
      var base={...a,paciente:cc.paciente,hospital:h?h.razao_social:'--',cid:cc.id};
      if(a.concluido){concluidas.push(base);}
      else if(a.data_proximo&&a.proximo_passo){acoes.push({...base,venc:a.data_proximo<hoje});}
    });
  });
  acoes.sort((a,b)=>a.data_proximo.localeCompare(b.data_proximo));
  concluidas.sort((a,b)=>(b.data_conclusao||'').localeCompare(a.data_conclusao||''));
  var prox=acoes.filter(a=>!a.venc);
  var venc=acoes.filter(a=>a.venc);

  // ── Painel de stats ──
  var porTipo={};
  var tempoTipo={};
  concluidas.forEach(function(a){
    var t=a.tipo||'Outros';
    porTipo[t]=(porTipo[t]||0)+1;
    var dur=parseFloat(a.duracao||0);
    tempoTipo[t]=(tempoTipo[t]||0)+dur;
  });
  var rankQtd=Object.entries(porTipo).sort((a,b)=>b[1]-a[1]);
  var rankTempo=Object.entries(tempoTipo).sort((a,b)=>b[1]-a[1]);

  // Rosca de ações por tipo
  var donutAtvData=rankQtd.map(([k,v])=>({lbl:k,v}));
  var donutAtvHtml=buildDonut(donutAtvData,'Acoes',v=>v+' acoes');

  // Ranking de quantidade
  var rankQtdH=rankQtd.length===0?'<p style="font-size:12px;color:var(--tx3)">Sem dados</p>'
    :rankQtd.map(([k,v],i)=>'<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">'
      +'<span style="font-size:11px;font-weight:700;color:var(--tl);width:18px">'+(i+1)+'.</span>'
      +'<div style="flex:1"><div style="font-size:12px;font-weight:600">'+esc(k)+'</div>'
      +'<div style="height:4px;background:var(--sf2);border-radius:2px;margin-top:2px">'
      +'<div style="height:100%;width:'+(rankQtd[0][1]>0?Math.round(v/rankQtd[0][1]*100):0)+'%;background:var(--tl);border-radius:2px"></div></div></div>'
      +'<span style="font-size:12px;font-weight:700;color:var(--tx2)">'+v+'</span>'
      +'</div>').join('');

  // Ranking de tempo
  var rankTempoH=rankTempo.filter(([,v])=>v>0).length===0?'<p style="font-size:12px;color:var(--tx3)">Sem duracao registrada</p>'
    :rankTempo.filter(([,v])=>v>0).map(([k,v],i)=>'<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">'
      +'<span style="font-size:11px;font-weight:700;color:var(--am);width:18px">'+(i+1)+'.</span>'
      +'<div style="flex:1"><div style="font-size:12px;font-weight:600">'+esc(k)+'</div>'
      +'<div style="height:4px;background:var(--sf2);border-radius:2px;margin-top:2px">'
      +'<div style="height:100%;width:'+(rankTempo[0][1]>0?Math.round(v/rankTempo[0][1]*100):0)+'%;background:var(--am);border-radius:2px"></div></div></div>'
      +'<span style="font-size:12px;font-weight:700;color:var(--tx2)">'+Math.round(v)+'min</span>'
      +'</div>').join('');

  function agCard(a,isVenc){
    var d=new Date(a.data_proximo+'T00:00:00');
    var dd=String(d.getDate()).padStart(2,'0');
    var mm=d.toLocaleString('pt-BR',{month:'short'}).toUpperCase();
    return '<div class="ag-item" data-cid="'+a.cid+'" data-atv="'+a._id+'" style="'+(isVenc?'border-color:var(--rd);background:var(--rd2)':'')+'">'
      +'<div class="ag-date" style="'+(isVenc?'background:var(--rd)':'')+'">'
      +'<div class="ag-d">'+dd+'</div><div class="ag-m">'+mm+'</div></div>'
      +'<div class="ag-content"><div class="ag-title">'+esc(a.proximo_passo)+'</div>'
      +'<div class="ag-sub">'+esc(a.paciente)+' | '+esc(a.hospital)+'</div>'
      +(a.contato?'<div class="ag-sub">Contato: '+esc(a.contato)+'</div>':'')
      +'</div>'
      +'<div style="display:flex;gap:5px;flex-shrink:0">'
      +'<button class="btn btn-xs btn-p ag-concluir-btn" data-cid="'+a.cid+'" data-atv="'+a._id+'" title="Registrar Conclusao" style="min-width:30px">&#10003;</button>'
      +'<button class="btn btn-xs btn-s ag-ver-btn" data-cid="'+a.cid+'" style="min-width:36px">Ver</button>'
      +'</div></div>';
  }

  function agCardConcluida(a){
    return '<div class="ag-item" style="border-color:var(--gn);background:var(--gn2)">'
      +'<div class="ag-date" style="background:var(--gn)"><div style="font-size:18px">&#10003;</div><div class="ag-m">OK</div></div>'
      +'<div class="ag-content"><div class="ag-title" style="color:var(--gn)">'+esc(a.proximo_passo)+'</div>'
      +'<div class="ag-sub">'+esc(a.paciente)+' | Tipo: '+esc(a.tipo||'--')+'</div>'
      +(a.obs_conclusao?'<div class="ag-sub" style="font-style:italic">'+esc(a.obs_conclusao)+'</div>':'')
      +(a.data_conclusao?'<div class="ag-sub">Concluido: '+fmtD(a.data_conclusao)+'</div>':'')
      +'</div></div>';
  }

  setHTML('pg',
    '<div class="pg-hd"><div><div class="pg-title">Agenda de Acoes</div>'
    +'<div class="pg-sub">'+prox.length+' pendentes | '+venc.length+' vencidas | '+concluidas.length+' concluidas</div></div></div>'
    // Painel de stats
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px">'
    // Rosca de tipos
    +'<div class="card"><div class="c-hd">Acoes por Tipo</div>'
    +(concluidas.length===0?'<div class="empty" style="padding:16px"><p>Sem acoes concluidas</p></div>':donutAtvHtml)
    +'</div>'
    // Ranking quantidade
    +'<div class="card"><div class="c-hd">Ranking por Quantidade</div>'+rankQtdH+'</div>'
    // Ranking tempo
    +'<div class="card"><div class="c-hd">Ranking por Tempo (min)</div>'+rankTempoH+'</div>'
    +'</div>'
    // Ações pendentes + vencidas
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">'
    +'<div class="card"><div class="c-hd" style="color:var(--tl)">Proximas Acoes ('+prox.length+')</div>'
    +(prox.length===0?'<div class="empty" style="padding:16px"><p>Nenhuma acao agendada.</p></div>':prox.map(a=>agCard(a,false)).join(''))
    +'</div>'
    +'<div class="card"><div class="c-hd" style="color:var(--rd)">Vencidas ('+venc.length+')</div>'
    +(venc.length===0?'<div class="empty" style="padding:16px"><p>Nenhuma acao vencida.</p></div>':venc.map(a=>agCard(a,true)).join(''))
    +'</div></div>'
    // Concluídas
    +(concluidas.length>0
      ?'<div class="card"><div class="c-hd" style="color:var(--gn)">Acoes Concluidas ('+concluidas.length+')</div>'
        +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+concluidas.slice(0,10).map(agCardConcluida).join('')+'</div></div>'
      :'')
    +'<div id="mcir-wrap"></div>'
  );
  // Event delegation para botões da agenda
  setTimeout(function(){
    var pg=document.getElementById('pg');
    if(!pg)return;
    pg.addEventListener('click',function(e){
      var btn=e.target.closest('button');
      if(!btn)return;
      var cid=btn.getAttribute('data-cid');
      var atv=btn.getAttribute('data-atv');
      if(btn.classList.contains('ag-concluir-btn')&&cid&&atv){
        e.stopPropagation();
        concluirAcao(cid,atv);
      } else if(btn.classList.contains('ag-ver-btn')&&cid){
        e.stopPropagation();
        S.page='cirurgias';
        renderApp();
        setTimeout(function(){openMCirById(cid);CT='atividades';renderMCir();},100);
      }
    });
  },50);
}
function concluirAcao(cid,atvId){
  var cir=S.cirs.find(function(x){return x.id===cid;});
  if(!cir){showAlert('Cirurgia nao encontrada','danger');return;}
  var atv=cir.atividades.find(function(a){return a._id===atvId;});
  if(!atv){showAlert('Atividade nao encontrada','danger');return;}
  // Remover modal anterior se existir
  var existing=document.getElementById('modal-concluir');
  if(existing)existing.remove();
  window._concAnexos=[];
  var hoje=fmtD(new Date().toISOString().split('T')[0]);
  var agora=new Date().toTimeString().slice(0,5);
  // Criar overlay
  var ov=document.createElement('div');
  ov.id='modal-concluir';
  ov.setAttribute('style','position:fixed;inset:0;z-index:9999;background:rgba(10,20,40,.6);display:flex;align-items:flex-start;justify-content:center;padding:24px 14px;overflow-y:auto');
  var html='<div style="background:#fff;border-radius:14px;width:100%;max-width:620px;box-shadow:0 12px 48px rgba(0,0,0,.25)">';
  // Header
  html+='<div style="padding:16px 22px;border-bottom:2px solid #009688;background:#F4F6F9;border-radius:14px 14px 0 0;display:flex;justify-content:space-between;align-items:center">';
  html+='<div><div style="font-size:15px;font-weight:700;color:#1A2332">Registrar Conclusao da Acao</div>';
  html+='<div style="font-size:11px;color:#8A95A3;margin-top:3px">'+esc(atv.proximo_passo||'')+'</div></div>';
  html+='<button id="mc-fechar" style="background:none;border:none;font-size:22px;cursor:pointer;color:#8A95A3;line-height:1;padding:2px 6px">&#215;</button>';
  html+='</div>';
  // Resumo

function hdConcAnx(input){
  Array.from(input.files).forEach(function(f){
    var rd=new FileReader();
    rd.onload=function(e){
      window._concAnexos=window._concAnexos||[];
      window._concAnexos.push({nome:f.name,data:e.target.result});
      var lst=document.getElementById('mc-anx-list');
      if(lst){
        lst.innerHTML=window._concAnexos.map(function(a){
          return '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px;background:#F4F6F9;border:1px solid #DDE2EA;border-radius:20px;font-size:11px">&#128206; '+esc(a.nome)+'</span>';
        }).join('');
      }
    };
    rd.readAsDataURL(f);
  });
}


async function salvarConclusao(cid,atvId){
  var reg=document.getElementById('mc-reg')?document.getElementById('mc-reg').value.trim():'';
  if(!reg){
    alert('Preencha o campo Registro / Observacoes.');
    return;
  }
  var cir=S.cirs.find(function(x){return x.id===cid;});
  if(!cir)return;
  var atv=cir.atividades.find(function(a){return a._id===atvId;});
  if(!atv)return;
  var btn=document.getElementById('mc-ok');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  var dataVal=document.getElementById('mc-data')?document.getElementById('mc-data').value:'';
  var statusVal=document.getElementById('mc-status')?document.getElementById('mc-status').value:'concluida';
  // Atualizar a atividade (nunca excluir — só marcar como concluída)
  atv.concluido=true;
  atv.status_conclusao=statusVal;
  atv.data_conclusao=toISO(dataVal)||new Date().toISOString().split('T')[0];
  atv.hora_conclusao=document.getElementById('mc-hora')?document.getElementById('mc-hora').value:'';
  atv.duracao_real=document.getElementById('mc-dur')?document.getElementById('mc-dur').value:'';
  atv.contato_conclusao=document.getElementById('mc-cont')?document.getElementById('mc-cont').value:'';
  atv.tel_conclusao=document.getElementById('mc-tel')?document.getElementById('mc-tel').value:'';
  atv.obs_conclusao=reg;
  atv.anexos_conclusao=window._concAnexos||[];
  var r=await DB.upd('cirurgias',{id:cid,atividades:cir.atividades},{id:cid});
  if(r.error){
    alert('Erro ao salvar: '+r.error.message);
    if(btn){btn.disabled=false;btn.textContent='✓ Confirmar Conclusao';}
    return;
  }
  var modal=document.getElementById('modal-concluir');
  if(modal)modal.remove();
  window._concAnexos=[];
  showAlert('Acao registrada com sucesso!','success');
  await loadData();
  renderAgenda();
}

    });

function groupBy(k){
  var m={};
  S.cirs.forEach(function(c){
    var lbl='';
    if(k==='hospital'){var h=S.devs.find(d=>d.id===c.hospital_id);lbl=h?h.razao_social:'Nao informado';}
    else if(k==='operadora'){var o=S.devs.find(d=>d.id===c.operadora_id);lbl=o?o.razao_social:'Nao informado';}
    else if(k==='portal')lbl=c.origem||'Nao informado';
    else lbl=c.medico||'Nao informado';
    if(!m[lbl])m[lbl]={cnt:0,a:0,u:0,p:0,r:0};
    m[lbl].cnt++;m[lbl].a+=matTot(c.mat_autorizado);m[lbl].u+=matTot(c.mat_utilizado);
    if(['aguardando','autorizado','pag_pendente'].includes(c.status))m[lbl].p++;

  });
  return Object.entries(m).sort((a,b)=>b[1].u-a[1].u);
}

    +'<div style="text-align:center;padding:10px 6px;background:var(--rd2);border-radius:var(--r2);border-top:3px solid var(--rd)"><div style="font-size:8px;color:var(--tx3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px;font-weight:700">F6 SALDO</div><div style="font-size:14px;font-weight:800;color:var(--rd)">'+fmt$(tS)+'</div></div>'
    +'</div></div>'
    +'<div class="card" style="margin-bottom:13px">'
    +mSec(c.mat_orcado,'FASE 1 — Material Orcado','resp_orcado')
    +'<hr style="border:none;border-top:1px solid var(--bd);margin:12px 0"/>'
    +mSec(c.mat_autorizado,'FASE 2 — Material Autorizado','resp_autorizado')

    +mSec(c.mat_utilizado,'FASE 3 — Material Utilizado','resp_utilizado')

    +'<hr style="border:none;border-top:1px solid var(--bd);margin:12px 0"/>'
    +mSec(c.mat_faturado,'FASE 5 — Material Faturado','resp_faturado')
    +dosSaldo(c)
    +'</div>'
    +'<div class="card" style="margin-bottom:13px">'
    +'<div class="dos-sec"><h3>Evidencias Pre-Cirurgicas</h3><div class="ev-list">'+evL(c.evidencias_pre)+'</div></div><hr class="sep"/>'
    +'<div class="dos-sec" style="margin-bottom:0"><h3>Evidencias Pos-Cirurgicas</h3><div class="ev-list">'+evL(c.evidencias_pos)+'</div></div>'
    +'</div>'
    +((c.atividades||[]).length?'<div class="card" style="margin-bottom:13px"><div class="dos-sec"><h3>Historico de Atividades</h3>'+atvL+'</div></div>':'')
    +(h?'<div class="card" style="margin-bottom:13px"><div class="dos-sec" style="margin-bottom:0"><h3>Dados do Hospital</h3>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px 18px;font-size:12px">'

      +'<div><span style="color:var(--tx3)">Endereco:</span> '+esc([h.endereco,h.cidade,h.uf].filter(Boolean).join(', '))+'</div>'
      +'<div><span style="color:var(--tx3)">Telefones:</span> '+esc(h.telefones||'--')+'</div>'
      +'</div></div></div>':'')
    +'<div style="text-align:center;padding:16px;color:var(--tx3);font-size:11px;border-top:1px solid var(--bd);margin-top:8px">'
    +'Documento gerado em '+new Date().toLocaleString('pt-BR')+' | Virtus -- Sistema de Gestao de Cobracas'
    +'</div></div>'
    +'<style>@media print{.no-print{display:none!important;}.dos-page{position:static;}}</style>';
  document.body.appendChild(pg);
}

function dlHtml(){
  var blob=new Blob([document.documentElement.outerHTML],{type:'text/html;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='virtus.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

(async function(){
  var url=localStorage.getItem(SBU),key=localStorage.getItem(SBK);
  if(url&&key){
    DB.init(url,key);
    var t=await DB.test();
    if(t.ok){await loadData();renderApp();return;}
    renderSetup('Reconexao falhou: '+t.msg);return;
  }
  renderSetup();
})();
</script>
